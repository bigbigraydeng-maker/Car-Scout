<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 市场基准利润计算器 - Car Scout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            opacity: 0.9;
        }
        
        .calculator-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        
        .section-title {
            font-size: 20px;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
        }
        
        .form-group label {
            font-weight: 600;
            color: #555;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .form-group input,
        .form-group select {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-calculate {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .btn-calculate:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .results-container {
            display: none;
            margin-top: 30px;
        }
        
        .market-price-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        
        .market-price-card h3 {
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .price-range {
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }
        
        .price-item {
            text-align: center;
            flex: 1;
            background: rgba(255,255,255,0.2);
            padding: 15px;
            border-radius: 10px;
        }
        
        .price-item .label {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 5px;
        }
        
        .price-item .value {
            font-size: 24px;
            font-weight: bold;
        }
        
        .scenarios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .scenario-card {
            border-radius: 15px;
            padding: 25px;
            position: relative;
            overflow: hidden;
        }
        
        .scenario-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
        }
        
        .scenario-conservative {
            background: #fff3e0;
        }
        .scenario-conservative::before {
            background: #ff9800;
        }
        
        .scenario-recommended {
            background: #e8f5e9;
        }
        .scenario-recommended::before {
            background: #4caf50;
        }
        
        .scenario-optimistic {
            background: #e3f2fd;
        }
        .scenario-optimistic::before {
            background: #2196f3;
        }
        
        .scenario-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .scenario-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(0,0,0,0.1);
        }
        
        .scenario-row:last-child {
            border-bottom: none;
        }
        
        .profit-positive {
            color: #4caf50;
            font-weight: bold;
        }
        
        .profit-negative {
            color: #f44336;
            font-weight: bold;
        }
        
        .cost-breakdown {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 25px;
        }
        
        .recommendation-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }
        
        .recommendation-box h3 {
            margin-bottom: 15px;
        }
        
        .risk-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: 600;
            margin-top: 10px;
        }
        
        .risk-low {
            background: #4caf50;
        }
        
        .risk-medium {
            background: #ff9800;
        }
        
        .risk-high {
            background: #f44336;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💰 市场基准利润计算器</h1>
            <p>基于 TradeMe & Facebook 历史售价数据</p>
        </div>
        
        <div class="calculator-card">
            <h2 class="section-title">🚗 车辆信息</h2>
            
            <div class="error-message" id="error-message"></div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label>品牌</label>
                    <select id="brand">
                        <option value="">选择品牌</option>
                        <option value="toyota">Toyota</option>
                        <option value="honda">Honda</option>
                        <option value="mazda">Mazda</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>车型</label>
                    <select id="model">
                        <option value="">先选择品牌</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>年份</label>
                    <input type="number" id="year" placeholder="例如: 2004" min="1990" max="2026">
                </div>
                
                <div class="form-group">
                    <label>里程 (km)</label>
                    <input type="number" id="mileage" placeholder="例如: 118000" min="0">
                </div>
                
                <div class="form-group">
                    <label>标价 ($)</label>
                    <input type="number" id="price" placeholder="例如: 3900" min="0">
                </div>
                
                <div class="form-group">
                    <label>车况</label>
                    <select id="condition">
                        <option value="excellent">优秀 - 几乎全新</option>
                        <option value="good">良好 - 保养到位</option>
                        <option value="average" selected>一般 - 正常使用痕迹</option>
                        <option value="fair">较差 - 需要小修</option>
                        <option value="poor">差 - 需要大修</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>上架天数</label>
                    <input type="number" id="listingDays" placeholder="例如: 3" min="0" value="3">
                </div>
            </div>
            
            <button class="btn-calculate" onclick="calculateProfit()">
                🧮 计算利润分析
            </button>
            
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>正在分析市场数据...</p>
            </div>
            
            <div class="results-container" id="results">
                <!-- 结果将显示在这里 -->
            </div>
        </div>
    </div>
    
    <script>
        // 车型数据
        const models = {
            toyota: [
                { value: 'corolla', label: 'Corolla' },
                { value: 'vitz', label: 'Vitz' },
                { value: 'yaris', label: 'Yaris' },
                { value: 'rav4', label: 'RAV4' },
                { value: 'camry', label: 'Camry' }
            ],
            honda: [
                { value: 'civic', label: 'Civic' },
                { value: 'accord', label: 'Accord' },
                { value: 'fit', label: 'Fit' },
                { value: 'jazz', label: 'Jazz' },
                { value: 'crv', label: 'CR-V' }
            ],
            mazda: [
                { value: '3', label: 'Mazda 3' },
                { value: '6', label: 'Mazda 6' },
                { value: 'cx-5', label: 'CX-5' },
                { value: 'cx-3', label: 'CX-3' },
                { value: 'axela', label: 'Axela' }
            ]
        };
        
        // 品牌选择变化时更新车型
        document.getElementById('brand').addEventListener('change', function() {
            const modelSelect = document.getElementById('model');
            const brand = this.value;
            
            modelSelect.innerHTML = '<option value="">选择车型</option>';
            
            if (brand && models[brand]) {
                models[brand].forEach(m => {
                    const option = document.createElement('option');
                    option.value = m.value;
                    option.textContent = m.label;
                    modelSelect.appendChild(option);
                });
            }
        });
        
        async function calculateProfit() {
            const brand = document.getElementById('brand').value;
            const model = document.getElementById('model').value;
            const year = parseInt(document.getElementById('year').value);
            const mileage = parseInt(document.getElementById('mileage').value);
            const price = parseInt(document.getElementById('price').value);
            const condition = document.getElementById('condition').value;
            const listingDays = parseInt(document.getElementById('listingDays').value) || 0;
            
            // 验证
            if (!brand || !model || !year || !mileage || !price) {
                showError('请填写所有必填字段！');
                return;
            }
            
            // 显示加载
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('error-message').style.display = 'none';
            
            try {
                const response = await fetch('/api/calculate-profit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        brand, model, year, mileage, price, condition, listingDays
                    })
                });
                
                const result = await response.json();
                
                if (result.error) {
                    showError(result.error);
                    return;
                }
                
                displayResults(result);
                
            } catch (err) {
                showError('计算失败: ' + err.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            document.getElementById('loading').style.display = 'none';
        }
        
        function displayResults(result) {
            const container = document.getElementById('results');
            
            const formatMoney = (num) => '$' + num.toLocaleString();
            const formatPercent = (num) => parseFloat(num).toFixed(1) + '%';
            
            let html = '';
            
            // 市场参考价
            if (result.marketReference) {
                html += `
                    <div class="market-price-card">
                        <h3>📊 市场参考价格</h3>
                        <div class="price-range">
                            <div class="price-item">
                                <div class="label">最低价</div>
                                <div class="value">${formatMoney(result.marketReference.min)}</div>
                            </div>
                            <div class="price-item">
                                <div class="label">平均价</div>
                                <div class="value">${formatMoney(result.marketReference.avg)}</div>
                            </div>
                            <div class="price-item">
                                <div class="label">最高价</div>
                                <div class="value">${formatMoney(result.marketReference.max)}</div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // 成本分析
            if (result.acquisition) {
                html += `
                    <div class="cost-breakdown">
                        <h3 style="margin-bottom: 15px;">💵 收购成本分析</h3>
                        <div class="scenario-row">
                            <span>卖家标价</span>
                            <strong>${formatMoney(result.acquisition.askingPrice)}</strong>
                        </div>
                        <div class="scenario-row">
                            <span>建议出价（可压价 ${result.acquisition.negotiationRoom}）</span>
                            <strong style="color: #667eea;">${formatMoney(result.acquisition.suggestedOffer)}</strong>
                        </div>
                        <div class="scenario-row">
                            <span>整修成本</span>
                            <span>${formatMoney(result.acquisition.refurbishmentCost)}</span>
                        </div>
                        <div class="scenario-row">
                            <span>总投资</span>
                            <strong>${formatMoney(result.acquisition.totalInvestment)}</strong>
                        </div>
                    </div>
                `;
            }
            
            // 三种场景
            if (result.scenarios) {
                html += `<h3 style="margin-bottom: 20px;">🏷️ 三种销售策略</h3>`;
                html += `<div class="scenarios-grid">`;
                
                const scenarios = [
                    { key: 'conservative', emoji: '🐢', title: '保守方案', class: 'scenario-conservative' },
                    { key: 'recommended', emoji: '⚖️', title: '推荐方案', class: 'scenario-recommended' },
                    { key: 'optimistic', emoji: '🚀', title: '乐观方案', class: 'scenario-optimistic' }
                ];
                
                scenarios.forEach(s => {
                    const data = result.scenarios[s.key];
                    const profitClass = parseFloat(data.margin) >= 0 ? 'profit-positive' : 'profit-negative';
                    
                    html += `
                        <div class="scenario-card ${s.class}">
                            <div class="scenario-title">${s.emoji} ${s.title}</div>
                            <div class="scenario-row">
                                <span>建议售价</span>
                                <strong>${formatMoney(data.salePrice)}</strong>
                            </div>
                            <div class="scenario-row">
                                <span>净利润</span>
                                <span class="${profitClass}">${formatMoney(data.profit)} (${formatPercent(data.margin)})</span>
                            </div>
                            <div class="scenario-row">
                                <span>销售周期</span>
                                <span>${data.timeframe}</span>
                            </div>
                            <div class="scenario-row">
                                <span>策略</span>
                                <span style="font-size: 13px; color: #666;">${data.strategy}</span>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            }
            
            // 综合建议
            if (result.recommendation) {
                const riskClass = result.riskLevel === 'low' ? 'risk-low' : result.riskLevel === 'medium' ? 'risk-medium' : 'risk-high';
                const riskText = result.riskLevel === 'low' ? '低风险' : result.riskLevel === 'medium' ? '中等风险' : '高风险';
                
                html += `
                    <div class="recommendation-box">
                        <h3>✅ 综合建议</h3>
                        <p style="font-size: 20px; margin-bottom: 15px;">${result.recommendation}</p>
                        <span class="risk-badge ${riskClass}">${riskText}</span>
                    </div>
                `;
            }
            
            container.innerHTML = html;
            container.style.display = 'block';
        }
    </script>
</body>
</html>
